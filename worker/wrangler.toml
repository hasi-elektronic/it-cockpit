name = "it-cockpit-api"
main = "src/index.ts"
compatibility_date = "2026-01-15"

[[d1_databases]]
binding = "DB"
database_name = "it-cockpit"
database_id = "REPLACE_AFTER_D1_CREATE"

[[r2_buckets]]
binding = "AGENTS"
bucket_name = "hasi-agent-binaries"

# Cron triggers: alert evaluator every 15 min
[triggers]
crons = ["*/15 * * * *"]

# Secrets (mit wrangler secret put):
#   PW_SALT       — z.B. langer Random-String, z.B. 64 Zeichen
#   TOKEN_SECRET  — Random für Bearer Token Signing
