<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Cockpit Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --blue: #3abadf;
        --ink: #111827;
        --muted: #667085;
        --line: #d8eef5;
        --bg: #f4f9fc;
        --nav: #0d1b2a;
        --orange: #ff6b00;
        --green: #12b76a;
        --red: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, rgba(58, 186, 223, .08), transparent 280px), var(--bg);
      }
      button, input, select, textarea { font: inherit; }
      .layout { min-height: 100vh; display: grid; grid-template-columns: 280px 1fr; }
      aside {
        background: linear-gradient(180deg, var(--nav), #081522);
        color: white;
        padding: 26px 22px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .brand {
        display: grid;
        grid-template-columns: 56px 1fr;
        align-items: center;
        gap: 13px;
        margin-bottom: 30px;
        padding-bottom: 22px;
        border-bottom: 1px solid rgba(216, 238, 245, .14);
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        background: #fff;
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .mark img { width: 42px; height: 42px; object-fit: contain; }
      .brand strong { display: block; font-size: 16px; line-height: 1.15; }
      .brand span { display: block; color: #a7dff0; font-size: 12px; margin-top: 4px; }
      nav a {
        display: flex;
        align-items: center;
        color: #cceefa;
        text-decoration: none;
        padding: 11px 12px;
        border-radius: 8px;
        margin-bottom: 6px;
        font-size: 14px;
      }
      nav a.active, nav a:hover { background: rgba(58, 186, 223, .18); color: white; }
      main { padding: 30px 28px 44px; max-width: 1320px; width: 100%; }
      header {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-start;
        margin-bottom: 22px;
      }
      .title-row { display: flex; align-items: center; gap: 14px; }
      .header-logo {
        width: 58px;
        height: 58px;
        border-radius: 12px;
        background: white;
        border: 1px solid var(--line);
        padding: 8px;
        object-fit: contain;
      }
      h1 { margin: 0; font-size: 34px; line-height: 1.05; letter-spacing: 0; }
      h2 { margin: 0 0 12px; font-size: 20px; }
      .subtitle { margin: 8px 0 0; color: var(--muted); }
      .btn {
        border: 0;
        border-radius: 8px;
        padding: 11px 14px;
        background: var(--blue);
        color: white;
        font-weight: 800;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
      }
      .btn.secondary { background: white; color: var(--ink); border: 1px solid var(--line); }
      .btn.orange { background: var(--orange); }
      .btn:disabled { opacity: .6; cursor: wait; }
      .btn.small {
        margin-top: 12px;
        padding: 8px 10px;
        font-size: 12px;
      }
      .grid { display: grid; gap: 16px; grid-template-columns: .95fr 1.05fr; align-items: start; }
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 10px 26px rgba(26, 95, 117, .07);
      }
      .notice {
        border-left: 4px solid var(--orange);
        background: #fff7ed;
        padding: 12px 14px;
        border-radius: 8px;
        color: #9a3412;
        font-size: 14px;
        margin-bottom: 14px;
      }
      .customer-list { display: grid; gap: 12px; }
      .customer-card {
        border: 1px solid #eef6f9;
        border-radius: 8px;
        padding: 14px;
        background: #f8fcfe;
      }
      .customer-card h3 { margin: 0 0 7px; font-size: 17px; }
      .customer-meta {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px 12px;
        margin-top: 10px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 5px 9px;
        background: #eef9fc;
        color: #17677f;
        font-size: 12px;
        font-weight: 800;
      }
      .pill.green { background: #ecfdf3; color: #067647; }
      .pill.gray { background: #f2f4f7; color: #475467; }
      .pill.orange { background: #fff7ed; color: #c2410c; }
      .pill.red { background: #fef3f2; color: #b42318; }
      .small { font-size: 12px; color: var(--muted); }
      .checklist {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 7px 10px;
        margin-top: 12px;
      }
      .check-item {
        display: flex;
        align-items: center;
        gap: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .check-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--red);
        flex: 0 0 auto;
      }
      .check-dot.ok { background: var(--green); }
      .check-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px 12px;
      }
      .check-label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 0;
        color: #344054;
        font-size: 13px;
        font-weight: 800;
      }
      .check-label input { width: auto; }
      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .field.full { grid-column: 1 / -1; }
      label {
        display: block;
        margin-bottom: 6px;
        color: #344054;
        font-size: 12px;
        font-weight: 800;
      }
      input, select, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 11px;
        background: #fff;
        color: var(--ink);
        outline: none;
      }
      textarea { min-height: 92px; resize: vertical; }
      input:focus, select:focus, textarea:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 4px rgba(58, 186, 223, .14);
      }
      .form-actions {
        grid-column: 1 / -1;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      @media (max-width: 980px) {
        .layout, .grid, form { grid-template-columns: 1fr; }
        aside { position: relative; height: auto; }
        header { flex-direction: column; }
        .field.full { grid-column: auto; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <div class="brand">
          <div class="mark"><img src="/hasi-logo.png" alt="Content Cockpit"></div>
          <div>
            <strong>Content Cockpit</strong>
            <span>Interne Verwaltung</span>
          </div>
        </div>
        <nav>
          <a class="active" href="/admin">Admin</a>
          <a href="/logout">Abmelden</a>
        </nav>
      </aside>
      <main>
        <header>
          <div class="title-row">
            <img class="header-logo" src="/hasi-logo.png" alt="Content Cockpit Logo">
            <div>
              <h1>Admin Center</h1>
              <p class="subtitle">Kunden anlegen und Stammdaten fuer den Social-Media-Service pflegen.</p>
            </div>
          </div>
        </header>

        <section class="grid">
          <div class="card">
            <h2>Kunden</h2>
            <div class="notice">Interne Verwaltung fuer alle Kunden. Hasi Elektronic ist hier nur ein Kunde in der Liste.</div>
            <div class="customer-list" id="customerList">...</div>
          </div>

          <div class="card">
            <h2 id="formTitle">Kunde anlegen</h2>
            <form id="customerForm">
              <input id="customerId" name="id" type="hidden">
              <div class="field">
                <label for="company">Firma *</label>
                <input id="company" name="company" required placeholder="z.B. Muster GmbH">
              </div>
              <div class="field">
                <label for="owner">Ansprechpartner</label>
                <input id="owner" name="owner" placeholder="Name">
              </div>
              <div class="field">
                <label for="email">E-Mail</label>
                <input id="email" name="email" type="email" placeholder="kontakt@firma.de">
              </div>
              <div class="field">
                <label for="phone">Telefon</label>
                <input id="phone" name="phone" placeholder="0711 / ...">
              </div>
              <div class="field">
                <label for="city">Ort</label>
                <input id="city" name="city" placeholder="Vaihingen/Enz">
              </div>
              <div class="field">
                <label for="instagram">Instagram</label>
                <input id="instagram" name="instagram" placeholder="@kunde">
              </div>
              <div class="field">
                <label for="industry">Branche</label>
                <input id="industry" name="industry" placeholder="Restaurant, Handwerk, Praxis ...">
              </div>
              <div class="field">
                <label for="language">Sprache</label>
                <select id="language" name="language">
                  <option value="de">Deutsch</option>
                  <option value="tr">Tuerkisch</option>
                  <option value="en">Englisch</option>
                </select>
              </div>
              <div class="field">
                <label for="primary">Hauptfarbe</label>
                <input id="primary" name="primary" value="#3ABADF">
              </div>
              <div class="field">
                <label for="accent">Akzentfarbe</label>
                <input id="accent" name="accent" value="#FF6B00">
              </div>
              <div class="field full">
                <label for="topics">Themen</label>
                <input id="topics" name="topics" placeholder="Angebote, Team, Tipps, Referenzen">
              </div>
              <div class="field">
                <label for="carouselTime">Karussell Zeit</label>
                <input id="carouselTime" name="carouselTime" value="08:00">
              </div>
              <div class="field">
                <label for="reelTime">Reel Zeit</label>
                <input id="reelTime" name="reelTime" value="08:30">
              </div>
              <div class="field">
                <label for="storyTime">Story Zeit</label>
                <input id="storyTime" name="storyTime" value="09:00">
              </div>
              <div class="field full">
                <label for="positioning">Positionierung</label>
                <textarea id="positioning" name="positioning" placeholder="Wofuer steht der Kunde? Was soll Social Media verkaufen oder erklaeren?"></textarea>
              </div>
              <div class="field full">
                <label>Onboarding Checklist</label>
                <div class="check-grid">
                  <label class="check-label"><input id="profileComplete" name="profileComplete" type="checkbox"> Profil vollständig</label>
                  <label class="check-label"><input id="brandComplete" name="brandComplete" type="checkbox"> Logo / Marke vollständig</label>
                  <label class="check-label"><input id="productPhotos" name="productPhotos" type="checkbox"> Produktfotos vorhanden</label>
                  <label class="check-label"><input id="productList" name="productList" type="checkbox"> Produktliste / Preise vorhanden</label>
                  <label class="check-label"><input id="instagramBusiness" name="instagramBusiness" type="checkbox"> Instagram Business verbunden</label>
                  <label class="check-label"><input id="facebookPage" name="facebookPage" type="checkbox"> Facebook Page verbunden</label>
                  <label class="check-label"><input id="metaAccess" name="metaAccess" type="checkbox"> Meta Business Zugriff erteilt</label>
                  <label class="check-label"><input id="contentPlan" name="contentPlan" type="checkbox"> Content Plan eingerichtet</label>
                </div>
              </div>
              <div class="field full">
                <label for="publishPermission">Yayın onayı</label>
                <select id="publishPermission" name="publishPermission">
                  <option value="missing">Noch offen</option>
                  <option value="approval">Erst Freigabe, dann Publish</option>
                  <option value="direct">Direkt veroeffentlichen erlaubt</option>
                </select>
              </div>
              <div class="field full">
                <label for="onboardingNotes">Onboarding Notizen</label>
                <textarea id="onboardingNotes" name="notes" placeholder="Was fehlt noch? Wer muss was liefern?"></textarea>
              </div>
              <div class="form-actions">
                <button class="btn orange" id="submitCustomer" type="submit">Kunde anlegen</button>
                <button class="btn secondary" id="resetForm" type="button">Neu</button>
                <span class="small" id="customerFormStatus"></span>
              </div>
            </form>
          </div>
        </section>
      </main>
    </div>
    <script>
      const $ = (id) => document.getElementById(id);
      const state = { customers: [], editingId: "" };

      async function api(path, options) {
        const response = await fetch(path, options);
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "API Fehler");
        return data;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function onboardingStatus(customer) {
        const ob = customer.onboarding || {};
        const mediaOk = Boolean(ob.productPhotos && ob.productList && ob.instagramBusiness && ob.facebookPage && ob.metaAccess && ob.publishPermission !== "missing");
        if (!ob.profileComplete) return { label: "Profil eksik", cls: "red" };
        if (!ob.brandComplete) return { label: "Marka bilgileri eksik", cls: "orange" };
        if (!mediaOk) return { label: "Medya erişimi eksik", cls: "orange" };
        if (!ob.contentPlan) return { label: "İçerik planı eksik", cls: "orange" };
        return { label: "Yayına hazır", cls: "green" };
      }

      function checklist(customer) {
        const ob = customer.onboarding || {};
        return [
          ["Profil", ob.profileComplete],
          ["Logo / Marka", ob.brandComplete],
          ["Ürün foto", ob.productPhotos],
          ["Ürün liste", ob.productList],
          ["Instagram Business", ob.instagramBusiness],
          ["Facebook Page", ob.facebookPage],
          ["Meta Zugriff", ob.metaAccess],
          ["Content Plan", ob.contentPlan],
        ].map(([label, ok]) => `
          <div class="check-item"><span class="check-dot ${ok ? "ok" : ""}"></span>${label}</div>
        `).join("");
      }

      function renderCustomers(customers = []) {
        state.customers = customers;
        $("customerList").innerHTML = customers.map((customer) => `
          <article class="customer-card">
            <h3>${escapeHtml(customer.company || customer.name)}</h3>
            <div>
              <span class="pill green">${escapeHtml(customer.status || "active")}</span>
              <span class="pill ${onboardingStatus(customer).cls}">${onboardingStatus(customer).label}</span>
              ${customer.instagram ? `<span class="pill">${escapeHtml(customer.instagram)}</span>` : ""}
              ${customer.language ? `<span class="pill gray">${escapeHtml(customer.language)}</span>` : ""}
            </div>
            <div class="customer-meta small">
              <div><strong>ID</strong><br>${escapeHtml(customer.id)}</div>
              <div><strong>Branche</strong><br>${escapeHtml(customer.industry || "-")}</div>
              <div><strong>Kontakt</strong><br>${escapeHtml(customer.owner || "-")}</div>
              <div><strong>Ort</strong><br>${escapeHtml(customer.city || "-")}</div>
            </div>
            <div class="checklist">${checklist(customer)}</div>
            ${customer.onboarding?.notes ? `<p class="small" style="margin:12px 0 0"><strong>Notiz:</strong> ${escapeHtml(customer.onboarding.notes)}</p>` : ""}
            ${customer.positioning ? `<p class="small" style="margin:12px 0 0">${escapeHtml(customer.positioning)}</p>` : ""}
            <button class="btn secondary small js-edit-customer" type="button" data-id="${escapeHtml(customer.id)}">Bearbeiten</button>
            <a class="btn secondary small" href="/kunde/${encodeURIComponent(customer.id)}">Cockpit öffnen</a>
          </article>
        `).join("") || `<div class="small">Noch keine Kunden angelegt.</div>`;
      }

      function resetCustomerForm() {
        state.editingId = "";
        $("customerForm").reset();
        $("customerId").value = "";
        $("primary").value = "#3ABADF";
        $("accent").value = "#FF6B00";
        $("language").value = "de";
        $("carouselTime").value = "08:00";
        $("reelTime").value = "08:30";
        $("storyTime").value = "09:00";
        $("publishPermission").value = "missing";
        $("formTitle").textContent = "Kunde anlegen";
        $("submitCustomer").textContent = "Kunde anlegen";
        $("customerFormStatus").textContent = "";
      }

      function editCustomer(id) {
        const customer = state.customers.find((item) => item.id === id);
        if (!customer) return;
        const ob = customer.onboarding || {};
        state.editingId = customer.id;
        $("customerId").value = customer.id;
        $("company").value = customer.company || customer.name || "";
        $("owner").value = customer.owner || "";
        $("email").value = customer.email || "";
        $("phone").value = customer.phone || "";
        $("city").value = customer.city || "";
        $("instagram").value = customer.instagram || "";
        $("industry").value = customer.industry || "";
        $("language").value = customer.language || "de";
        $("primary").value = customer.brand?.primary || "#3ABADF";
        $("accent").value = customer.brand?.accent || "#FF6B00";
        $("topics").value = (customer.topics || []).join(", ");
        $("carouselTime").value = customer.cadence?.carousel || "08:00";
        $("reelTime").value = customer.cadence?.reel || "08:30";
        $("storyTime").value = customer.cadence?.story || "09:00";
        $("positioning").value = customer.positioning || "";
        $("profileComplete").checked = Boolean(ob.profileComplete);
        $("brandComplete").checked = Boolean(ob.brandComplete);
        $("productPhotos").checked = Boolean(ob.productPhotos);
        $("productList").checked = Boolean(ob.productList);
        $("instagramBusiness").checked = Boolean(ob.instagramBusiness);
        $("facebookPage").checked = Boolean(ob.facebookPage);
        $("metaAccess").checked = Boolean(ob.metaAccess);
        $("contentPlan").checked = Boolean(ob.contentPlan);
        $("publishPermission").value = ob.publishPermission || "missing";
        $("onboardingNotes").value = ob.notes || "";
        $("formTitle").textContent = `${customer.company || customer.name} bearbeiten`;
        $("submitCustomer").textContent = "Kunde speichern";
        $("customerFormStatus").textContent = "Bearbeitungsmodus";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      async function refreshCustomers() {
        const data = await api("/api/customers");
        renderCustomers(data.customers || []);
      }

      async function createCustomer(event) {
        event.preventDefault();
        const form = event.currentTarget;
        const status = $("customerFormStatus");
        const button = form.querySelector("button[type='submit']");
        status.textContent = "Speichern...";
        button.disabled = true;
        const payload = Object.fromEntries(new FormData(form).entries());
        payload.secondary = payload.primary || "#41AADE";
        for (const key of ["profileComplete", "brandComplete", "productPhotos", "productList", "instagramBusiness", "facebookPage", "metaAccess", "contentPlan"]) {
          payload[key] = form.elements[key].checked;
        }
        try {
          const path = state.editingId ? `/api/customers/${encodeURIComponent(state.editingId)}` : "/api/customers";
          await api(path, {
            method: state.editingId ? "PUT" : "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          status.textContent = state.editingId ? "Kunde gespeichert." : "Kunde angelegt.";
          resetCustomerForm();
          await refreshCustomers();
        } catch (error) {
          status.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      }

      $("customerForm").addEventListener("submit", createCustomer);
      $("resetForm").addEventListener("click", resetCustomerForm);
      document.addEventListener("click", (event) => {
        const edit = event.target.closest(".js-edit-customer");
        if (edit) editCustomer(edit.dataset.id);
      });
      refreshCustomers().catch((error) => {
        $("customerList").textContent = error.message;
      });
    </script>
  </body>
</html>
